{% extends 'core/base.html' %}
{% block content %}
    <div class="pt-16">
        <div class="bg-white py-24 sm:py-32">
            <div class="mx-auto max-w-7xl px-6 lg:px-8">
                <div class="mx-auto max-w-2xl text-center"><h2
                        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">Frequently Asked
                    Questions</h2>
                    <p class="mt-2 text-lg leading-8 text-gray-600">Find answers to common questions about astrology
                        readings and consultations.</p></div>
                <div class="mt-16">
                    <div class="mx-auto max-w-2xl divide-y divide-gray-900/10">
                        {% for faq in faqs %}
                            <div class="py-6">
                                <button class="flex w-full items-start justify-between text-left faqTogglerButton"><h3
                                        class="text-lg font-semibold leading-7 text-gray-900">{{ faq.question }}</h3>
                                    <span class="ml-6 flex h-7 items-center"><svg
                                            xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24"
                                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round"
                                            class="lucide lucide-chevron-down h-6 w-6 transform transition-transform duration-200 faqTogglerButtonIcon"><path
                                            d="m6 9 6 6 6-6"></path></svg></span></button>
                                <div class="mt-2 overflow-hidden transition-all duration-200 ease-in-out max-h-0 opacity-0 faqContent">
                                    <p
                                            class="text-base leading-7 text-gray-600">{{ faq.answer }}</p></div>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
