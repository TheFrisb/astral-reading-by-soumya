{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% block head %}{% endblock head %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind_output.css' %}">
    <title>{{ page_tags.title }}</title>
</head>
<body class="font-open-sans">
{% include 'core/includes/header.html' %}
<div>
    {% block content %}{% endblock content %}
</div>
{% include 'core/includes/footer.html' %}

{% block scripts %}{% endblock scripts %}
</body>
</html>
