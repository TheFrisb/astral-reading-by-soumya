{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% block head %}{% endblock head %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.core.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.theme.min.css">
    <link rel="stylesheet" href="{% static 'css/tailwind_output.css' %}">
    <title>{{ page_tags.title }}</title>
</head>
<body class="font-open-sans bg-star-pattern bg-repeat">
{% include 'core/includes/header.html' %}
<div class="w-full">
    <div class="container mx-auto px-2">
        {% block content %}{% endblock content %}
    </div>
</div>
{% include 'core/includes/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/@glidejs/glide"></script>
<script src="{% static 'js/core_v1.bundle.js' %}"></script>
{% block scripts %}{% endblock scripts %}
</body>
</html>
