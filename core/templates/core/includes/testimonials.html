<div class="bg-purple-50 py-24 sm:py-32">
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="mx-auto max-w-2xl text-center">
            <h2 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">
                Client Testimonials
            </h2>
            <p class="mt-4 text-lg leading-8 text-gray-600">
                Discover what others have experienced through their astrological journey with us.
            </p>
        </div>
        <div class="mx-auto mt-16 max-w-7xl sm:mt-20 lg:mt-24">
            <div class="pb-12">
                <div class="swiper swiper-initialized swiper-horizontal swiper-backface-hidden testimonials-swiper !pb-8">
                    <div class="swiper-wrapper"
                    >
                        {% for testimonial in testimonials %}
                            <div class="swiper-slide h-auto"
                                 data-swiper-slide-index="0">
                                <figure class="rounded-3xl bg-white p-8 shadow-lg ring-1 ring-gray-900/5 h-full flex flex-col">
                                    <blockquote class="text-gray-900 flex-grow"><p
                                            class="text-lg font-semibold leading-8">
                                        "{{ testimonial.content }}"</p></blockquote>
                                    <figcaption class="mt-6 flex items-center gap-x-4">
                                        <div>
                                            <div class="font-semibold">{{ testimonial.full_name }}</div>
                                            <div class="text-gray-600">{{ testimonial.reading_type.get_display_name }}</div>
                                        </div>
                                        <div class="flex-1 flex justify-end">
                                            <div class="flex">
                                                {% for i in testimonial_star_range %}
                                                    {% if testimonial.rating >= i %}
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                             stroke-width="2"
                                                             stroke-linecap="round" stroke-linejoin="round"
                                                             class="lucide lucide-star h-5 w-5 fill-current text-yellow-400">
                                                            <polygon
                                                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                                        </svg>
                                                    {% else %}
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                             stroke-width="2"
                                                             stroke-linecap="round" stroke-linejoin="round"
                                                             class="lucide lucide-star h-5 w-5 fill-current text-gray-300">
                                                            <polygon
                                                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                                        </svg>
                                                    {% endif %}
                                                {% endfor %}

                                            </div>
                                        </div>
                                    </figcaption>
                                </figure>
                            </div>
                        {% endfor %}

                    </div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
            </div>
        </div>
    </div>
</div>
