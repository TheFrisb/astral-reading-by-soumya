<header class="fixed w-full bg-[#1a0942]/95 backdrop-blur supports-[backdrop-filter]:bg-[#1a0942]/75 z-50">
    <nav class="mx-auto flex max-w-7xl items-center justify-between p-6 lg:px-8" aria-label="Global">
        <div class="flex lg:flex-1">
            <a href="{% url 'core:home' %}" class="-m-1.5 p-1.5">
                <span class="text-xl font-semibold text-white">Astral Readings by Soumya</span>
            </a>
        </div>
        <div class="flex lg:hidden">
            <button
                    type="button"
                    class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-white mobileMenuTogglerButton"
            >
                <span class="sr-only">Open main menu</span>
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
                </svg>
            </button>
        </div>
        <div class="hidden lg:flex lg:gap-x-8">
            <a href="{% url 'core:horoscope_list' %}"
               class="text-sm font-semibold leading-6 text-white rounded-lg px-3 py-2 transition-colors hover:bg-[#2d0f6b]">
                Horoscope
            </a>
            <a href="{% url 'core:readings' %}"
               class="text-sm font-semibold leading-6 text-white rounded-lg px-3 py-2 transition-colors hover:bg-[#2d0f6b]">
                Readings
            </a>
            <a href="{% url 'blog:home' %}"
               class="text-sm font-semibold leading-6 text-white rounded-lg px-3 py-2 transition-colors hover:bg-[#2d0f6b]">
                Blog
            </a>
            <a href="{% url 'core:about' %}"
               class="text-sm font-semibold leading-6 text-white rounded-lg px-3 py-2 transition-colors hover:bg-[#2d0f6b]">
                About
            </a>
            <a href="{% url 'core:faq' %}"
               class="text-sm font-semibold leading-6 text-white rounded-lg px-3 py-2 transition-colors hover:bg-[#2d0f6b]">
                FAQ
            </a>
        </div>
        <div class="hidden lg:flex lg:flex-1 lg:justify-end">
            <a
                    href="{% url 'core:readings' %}"
                    class="rounded-lg bg-purple-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-purple-500 transition-colors"
            >
                Book a Reading
            </a>
        </div>
    </nav>

    <div id="overlay" class="overlay fixed inset-0 bg-black/30 mobileMenuTogglerButton h-screen"></div>

    <div id="mobileMenu"
         class="mobile-menu fixed inset-y-0 right-0 z-50 w-full overflow-y-auto bg-[#1a0942] px-6 py-6 sm:max-w-sm sm:ring-1 sm:ring-white/10 h-screen">
        <div class="flex items-center justify-between">
            <a href="{% url 'core:home' %}" class="-m-1.5 p-1.5">
                <span class="text-xl font-semibold text-white">Astral Readings</span>
            </a>
            <button
                    type="button"
                    class="-m-2.5 rounded-md p-2.5 text-white mobileMenuTogglerButton"
            >
                <span class="sr-only">Close menu</span>
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="mt-6 flow-root">
            <div class="-my-6 divide-y divide-gray-500/25">
                <div class="space-y-2 py-6">
                    <a
                            href="{% url 'core:horoscope_list' %}"
                            class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold leading-7 text-white hover:bg-[#2d0f6b] transition-colors"
                    >
                        Horoscope
                    </a>
                    <a
                            href="{% url 'core:readings' %}"
                            class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold leading-7 text-white hover:bg-[#2d0f6b] transition-colors"
                    >
                        Readings
                    </a>
                    <a
                            href="{% url 'blog:home' %}"
                            class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold leading-7 text-white hover:bg-[#2d0f6b] transition-colors"
                    >
                        Blog
                    </a>
                    <a
                            href="{% url 'core:about' %}"
                            class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold leading-7 text-white hover:bg-[#2d0f6b] transition-colors"
                    >
                        About
                    </a>
                    <a
                            href="{% url 'core:faq' %}"
                            class="-mx-3 block rounded-lg px-3 py-2 text-base font-semibold leading-7 text-white hover:bg-[#2d0f6b] transition-colors"
                    >
                        FAQ
                    </a>
                </div>
                <div class="py-6">
                    <a
                            href="{% url 'core:readings' %}"
                            class="-mx-3 rounded-lg px-3 py-2.5 text-base font-semibold leading-7 text-white bg-[#2d0f6b] transition-colors flex items-center justify-between"
                    >
                        Book a Reading <span
                            aria-hidden="true">→</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
  function toggleMobileMenu() {
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('overlay');

    if (mobileMenu.classList.contains('active')) {
      mobileMenu.classList.remove('active');
      overlay.classList.remove('active');

      // Add exit animation classes
      mobileMenu.classList.add('mobile-menu-exit');
      overlay.classList.add('mobile-menu-overlay-exit');

      // Remove animation classes after animation completes
      setTimeout(() => {
        mobileMenu.classList.remove('mobile-menu-exit');
        overlay.classList.remove('mobile-menu-overlay-exit');
      }, 300);
    } else {
      mobileMenu.classList.add('active');
      overlay.classList.add('active');

      // Add enter animation classes
      mobileMenu.classList.add('mobile-menu-enter');
      overlay.classList.add('mobile-menu-overlay-enter');

      // Switch to active animation
      requestAnimationFrame(() => {
        mobileMenu.classList.add('mobile-menu-enter-active');
        overlay.classList.add('mobile-menu-overlay-enter-active');
      });

      // Remove animation classes after animation completes
      setTimeout(() => {
        mobileMenu.classList.remove('mobile-menu-enter', 'mobile-menu-enter-active');
        overlay.classList.remove('mobile-menu-overlay-enter', 'mobile-menu-overlay-enter-active');
      }, 300);
    }
  }
</script>
